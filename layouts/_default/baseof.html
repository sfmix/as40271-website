<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | AS40271{{ end }}</title>
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  <header class="site-header">
    <div class="container nav-container">
      <a href="{{ "/" | relURL }}" class="site-logo">
        <span class="logo-text">AS40271</span>
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav">
        <ul class="nav-list">
          {{ range .Site.Menus.main }}
          <li class="nav-item">
            <a href="{{ .URL | relURL }}" class="nav-link">{{ .Name }}</a>
          </li>
          {{ end }}
          <li class="nav-item">
            <a href="{{ .Site.Params.peeringdb_url }}" class="nav-link" target="_blank" rel="noopener">PeeringDB</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    {{- block "main" . }}{{- end }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        <a href="{{ .Site.Params.peeringdb_url }}" target="_blank" rel="noopener">PeeringDB</a>
        &middot;
        <a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a>
      </p>
      <p>&copy; {{ now.Year }} {{ .Site.Params.copyright_name }}</p>
    </div>
  </footer>

  <script>
    document.querySelector('.nav-toggle').addEventListener('click', function() {
      document.querySelector('.site-nav').classList.toggle('open');
    });
  </script>
</body>
</html>
